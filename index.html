  renderAll(); // refreshes quotas, stats, and the day-input visibility for this account
}
async function setUserQuota(userId, value) {
  const u = users.find(u => u._id === userId);
  if (!u) return;
  const n = parseInt(value, 10);
  if (isNaN(n) || n < 0) { alert('Enter a whole number of days (0 or more).'); renderAll(); return; }
  // Warn (but allow) if lowering below what they've already booked — existing stays aren't reclassified.
  const perQuarter = {};
  reservations.filter(r => r.Owner === u.Name && r.Type === 'fixed' && r.Status === 'confirmed' && r.StartDate && r.EndDate)
    .forEach(r => { perQuarter[r.Quarter] = (perQuarter[r.Quarter] || 0) + dateRange(fromStr(r.StartDate), fromStr(r.EndDate)).length; });
  let maxQk = null, maxDays = 0;
  Object.entries(perQuarter).forEach(([qk, d]) => { if (d > maxDays) { maxDays = d; maxQk = qk; } });
  if (n < maxDays && !confirm(`${u.Name} already has ${maxDays} fixed day(s) booked in ${maxQk}. Lowering the quota to ${n} won't change existing bookings — they'll simply exceed the new limit. Continue?`)) {
    renderAll(); return;
  }
  try { await updateRow('Users', userId, { DaysPerQuarter: n }); u.DaysPerQuarter = n; }
  catch(e) { alert('Error changing days: ' + e.message); }
  renderAll();
}
async function addUser() {
  const name = (document.getElementById('new-user-name').value || '').trim();
  const role = document.getElementById('new-user-role').value;
  const daysRaw = (document.getElementById('new-user-days').value || '').trim();
  const pass = (document.getElementById('new-user-pass').value || '').trim();
  if (!name) { showErr('new-user-err', 'Name is required.'); return; }
  if (usersNamed(name).length) { showErr('new-user-err', `An account named “${name}” already exists.`); return; }
  if (!pass) { showErr('new-user-err', 'Set a password for the new account.'); return; }
  const cells = { Name: name, Password: pass, Role: ROLES.includes(role) ? role : 'guest' };
  if (daysRaw !== '') { const n = parseInt(daysRaw, 10); if (!isNaN(n) && n >= 0) cells.DaysPerQuarter = n; }
  try {
    const ids = await addRows('Users', [cells]);
    if (ids[0]) users.push({ _id: ids[0], ...cells });
  } catch(e) { showErr('new-user-err', 'Error creating account: ' + e.message); return; }
  renderAll();
}
async function deleteUser(userId) {
  const u = users.find(u => u._id === userId);
  if (!u) return;
  if (u.Name && u.Name.trim().toLowerCase() === (currentUser || '').toLowerCase()) {
    alert("You can't delete your own account while signed in."); return;
  }
  const owners = users.filter(x => (x.Role || '').toLowerCase().trim() === 'owner');
  if ((u.Role || '').toLowerCase().trim() === 'owner' && owners.length <= 1) {
    alert("You can't delete the only owner account."); return;
  }
  if (!confirm(`Delete the account “${u.Name}”? This removes their login only — existing reservations are kept.`)) return;
  try {
    await deleteRows('Users', [userId]);
    users = users.filter(x => x._id !== userId);
  } catch(e) { alert('Error deleting account: ' + e.message); return; }
  renderAll();
}

// ── Self-service password change (any signed-in non-guest user) ──
function renderMyAccount() {
  const el = document.getElementById('my-account');
  if (!el) return;
  // Guests don't get the password-change panel; clear it when signed out or for guests.
  if (!currentUser || isGuest()) { el.innerHTML = ''; el.dataset.renderedFor = ''; return; }
  // Don't rebuild on every renderAll — that would wipe half-typed fields. Only (re)render when
  // the panel is empty or the signed-in user changed.
  if (el.dataset.renderedFor === currentUser && el.querySelector('#mypw-current')) return;
  el.dataset.renderedFor = currentUser;
  el.innerHTML = `
    <div class="admin-section">
      <h3>My account</h3>
      <div class="pw-change">
        <input type="password" id="mypw-current" placeholder="Current password" autocomplete="current-password">
        <input type="password" id="mypw-new" placeholder="New password" autocomplete="new-password">
        <input type="password" id="mypw-confirm" placeholder="Confirm new password" autocomplete="new-password">
        <button class="btn primary" style="font-size:12px;padding:6px 12px" onclick="changeMyPassword()">Change password</button>
        <span id="mypw-status" style="font-size:12px;color:var(--green);display:none">Updated ✓</span>
      </div>
      <div class="err" id="mypw-err" style="display:none"></div>
    </div>`;
}
async function changeMyPassword() {
  const cur = (document.getElementById('mypw-current').value || '').trim();
  const nw  = (document.getElementById('mypw-new').value || '').trim();
  const cf  = (document.getElementById('mypw-confirm').value || '').trim();
  if (!nw) { showErr('mypw-err', 'Enter a new password.'); return; }
  if (nw !== cf) { showErr('mypw-err', 'New passwords do not match.'); return; }
  try {
    const res = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword: cur, newPassword: nw }),
    });
    const data = await res.json();
    if (!res.ok) { showErr('mypw-err', data.error || 'Failed to change password.'); return; }
  } catch(e) { showErr('mypw-err', 'Error: ' + e.message); return; }
  ['mypw-current', 'mypw-new', 'mypw-confirm'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('mypw-err').style.display = 'none';
  const st = document.getElementById('mypw-status');
  if (st) { st.style.display = ''; setTimeout(() => st.style.display = 'none', 2500); }
}

async function resolveFloat(rowId, status) {
  try {
    await updateRow('Reservations', rowId, { Status: status });
    const r = reservations.find(r => r._id === rowId);
    if (r) r.Status = status;
  } catch(e) { alert('Error: ' + e.message); return; }
  renderAll();
}

// ════════════════════════════════════════════════════════
// NAVIGATION & UTILITIES
// ════════════════════════════════════════════════════════
function syncQuarterToMonth() {
  const newQk = quarterKey(curYear, Math.floor(curMonth / 3) + 1);
  if (newQk === selectedQuarter) return;
  selectedQuarter = newQk;
  const sel = document.getElementById('quarter-select');
  if (sel) {
    if (!Array.from(sel.options).some(o => o.value === newQk)) {
      const [y, q] = newQk.split('-Q').map(Number);
      const opt = document.createElement('option');
      opt.value = newQk;
      opt.textContent = quarterOptionLabel(y, q);
      const newOpt = Array.from(sel.options).find(o => o.value === '__new__');
      newOpt ? sel.insertBefore(opt, newOpt) : sel.appendChild(opt);
    }
    sel.value = newQk;
  }
  if (johnSelecting && johnSelecting.quarter !== newQk) {
    johnSelecting = null;
    document.getElementById('john-sel-bar').classList.remove('active');
  }
  if (userSelecting && userSelecting.quarter !== newQk) {
    userSelecting = null;
    document.getElementById('user-sel-bar').classList.remove('active');
  }
}

function prevMonth() {
  if (curMonth > 0) curMonth--; else { curMonth = 11; curYear--; }
  syncQuarterToMonth();
  renderAll();
}
function nextMonth() {
  if (curMonth < 11) curMonth++; else { curMonth = 0; curYear++; }
  syncQuarterToMonth();
  renderAll();
}
function showErr(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
// Escape user-supplied text before injecting it into innerHTML.
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  try {

    if (res.ok) {
      const data = await res.json();
      await login(data.name);
      return;
    }

  showLogin();
